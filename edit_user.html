{% extends "base.html" %}
{% block title %}404 — Não Encontrado{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-title">Página não encontrada</div>
    <p class="error-msg">A página que você está procurando não existe<br>ou foi movida para outro endereço.</p>
    <div class="d-flex gap-2 justify-content-center">
      <a href="javascript:history.back()" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Voltar
      </a>
      <a href="{{ url_for('main.index') }}" class="btn btn-primary">
        <i class="bi bi-house me-2"></i>Início
      </a>
    </div>
  </div>
</div>
{% endblock %}
