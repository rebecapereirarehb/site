{% extends "base.html" %}
{% block title %}403 — Acesso Negado{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-card">
    <div class="error-code">403</div>
    <div class="error-title">Acesso Negado</div>
    <p class="error-msg">Você não tem permissão para acessar esta página.<br>
      Verifique seu perfil ou entre em contato com o administrador.</p>
    <div class="d-flex gap-2 justify-content-center">
      <a href="javascript:history.back()" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Voltar
      </a>
      <a href="{{ url_for('main.index') }}" class="btn btn-primary">
        <i class="bi bi-house me-2"></i>Início
      </a>
    </div>
  </div>
</div>
{% endblock %}
