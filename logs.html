{% extends "base.html" %}
{% block title %}500 — Erro Interno{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-card">
    <div class="error-code">500</div>
    <div class="error-title">Erro interno do servidor</div>
    <p class="error-msg">Algo deu errado no servidor. Nossa equipe foi notificada.<br>Tente novamente em alguns instantes.</p>
    <div class="d-flex gap-2 justify-content-center">
      <a href="{{ url_for('main.index') }}" class="btn btn-primary">
        <i class="bi bi-house me-2"></i>Início
      </a>
    </div>
  </div>
</div>
{% endblock %}
